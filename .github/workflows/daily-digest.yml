name: Daily AI News Digest

# KST 08:00~09:55 매 5분 trigger (= UTC 23:00~00:55).
#
# UTC 23,0 시각 ↔ KST 변환:
#   - UTC 23:00 = KST 08:00 (당일)
#   - UTC 23:55 = KST 08:55
#   - UTC 00:00 = KST 09:00
#   - UTC 00:55 = KST 09:55
#
# 매 5분 trigger 중에서 admin Settings 의 send_hour:send_minute (기본 8:40)
# 와 ±2분 윈도우 매칭 시점에만 cli 게이트가 통과해 파이프라인 진행. 그 외
# trigger 는 cli 의 시각 게이트가 즉시 skip (runs 추가 X).
#
# 매 5분 + ±2분 윈도우 = 한 cycle 에 정확히 1개 trigger 매칭 → 발송 시각
# 정확도 ±2분. (매 10분 + ±5분 보다 정확.)
#
# 비용: 일 22회 × 1분 + 발송 2분/일 = 월 720분 (free 2,000 의 36%).
#
# 같은 날 두 번 발송 방지는 run_store.has_success_today() 가 처리.
on:
  schedule:
    - cron: "*/5 23,0 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run pipeline but skip mail send"
        type: boolean
        default: false

# 같은 워크플로우 중복 실행 방지 (장시간 실행 케이스 보호).
concurrency:
  group: daily-digest
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run digest
        env:
          DRY_RUN_FLAG: ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
        run: uv run python -m ai_news_scraping.cli run $DRY_RUN_FLAG
